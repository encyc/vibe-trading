<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE TRADING | QUANTUM COMMAND CENTER</title>

    <!-- GridStack.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7.2.3/dist/gridstack.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/gridstack@7.2.3/dist/gridstack-all.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --border-glow: rgba(0, 240, 255, 0.3);
            --neon-cyan: #00f0ff;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-amber: #f59e0b;
            --neon-rose: #f43f5e;
            --neon-pink: #ec4899;
            --neon-blue: #3b82f6;
            --neon-teal: #14b8a6;
            --neon-gold: #fbbf24;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }

        /* 扫描线背景效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            z-index: 1000;
        }

        /* 网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        /* GridStack 自定义样式 */
        .grid-stack {
            background: transparent;
        }

        .grid-stack-item {
            margin-bottom: +4px;
        }

        .grid-stack-item-content {
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .grid-stack-item-content:hover {
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        .grid-stack-item-placeholder {
            background: rgba(0, 240, 255, 0.1);
            border: 2px dashed var(--neon-cyan);
            border-radius: 4px;
        }

        /* GridStack 拖拽时的样式 */
        .grid-stack-item.ui-draggable-dragging .grid-stack-item-content {
            opacity: 0.9;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transform: scale(1.02);
        }

        .grid-stack-item.ui-resizable-resizing .grid-stack-item-content {
            border-color: var(--neon-cyan);
        }

        /* 磁贴头部 */
        .tile-header {
            background: linear-gradient(180deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 240, 255, 0.05) 100%);
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            flex-shrink: 0;
        }

        .tile-header:active {
            cursor: grabbing;
        }

        .tile-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* GridStack 自定义手柄 */
        .ui-resizable-se,
        .ui-resizable-sw {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 20px;
            background: transparent;
            cursor: nwse-resize;
        }

        .ui-resizable-se {
            right: 0;
        }

        .ui-resizable-sw {
            left: 0;
        }

        .ui-resizable-se::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--neon-cyan);
            border-bottom: 2px solid var(--neon-cyan);
        }

        /* 磁贴内容 */
        .tile-content {
            padding: 12px;
            flex: 1;
            overflow: hidden;
            overflow-y: auto;
            min-height: 0;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 240, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.5);
        }

        /* 动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            }
        }

        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-glow { animation: glow-pulse 2s ease-in-out infinite; }

        /* 状态指示器 */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .status-dot.offline {
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        /* Agent 协作流程 */
        .phase-node {
            position: relative;
            padding: 10px 14px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 4px;
            background: rgba(0, 240, 255, 0.05);
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .phase-node:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .phase-node.active {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            animation: glow-pulse 1.5s ease-in-out infinite;
        }

        .phase-node.completed {
            border-color: var(--neon-green);
            background: rgba(16, 185, 129, 0.1);
        }

        /* Agent 标签 */
        .agent-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 6px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .agent-tag.technical { background: rgba(0, 240, 255, 0.2); color: var(--neon-cyan); border: 1px solid rgba(0, 240, 255, 0.3); }
        .agent-tag.fundamental { background: rgba(139, 92, 246, 0.2); color: var(--neon-purple); border: 1px solid rgba(139, 92, 246, 0.3); }
        .agent-tag.news { background: rgba(245, 158, 11, 0.2); color: var(--neon-amber); border: 1px solid rgba(245, 158, 11, 0.3); }
        .agent-tag.sentiment { background: rgba(244, 63, 94, 0.2); color: var(--neon-rose); border: 1px solid rgba(244, 63, 94, 0.3); }
        .agent-tag.bull { background: rgba(16, 185, 129, 0.2); color: var(--neon-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .agent-tag.bear { background: rgba(239, 68, 68, 0.2); color: var(--neon-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .agent-tag.risk { background: rgba(236, 72, 153, 0.2); color: var(--neon-pink); border: 1px solid rgba(236, 72, 153, 0.3); }
        .agent-tag.trader { background: rgba(251, 191, 36, 0.2); color: var(--neon-gold); border: 1px solid rgba(251, 191, 36, 0.3); }
        .agent-tag.pm { background: rgba(255, 255, 255, 0.2); color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.3); }

        /* Tab 样式 */
        .tab-btn {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--text-secondary);
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .tab-btn.active {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* 决策历史 */
        .decision-item {
            padding: 6px 10px;
            border-left: 2px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.02);
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }

        .decision-item:hover {
            border-left-color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.05);
        }

        .decision-item.buy { border-left-color: var(--neon-green); }
        .decision-item.sell { border-left-color: var(--neon-red); }
        .decision-item.hold { border-left-color: var(--neon-amber); }

        /* 日志 */
        .log-entry {
            padding: 3px 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.05);
            transition: all 0.2s ease;
        }

        .log-entry:hover {
            background: rgba(0, 240, 255, 0.02);
        }

        .log-entry.info { color: var(--neon-blue); }
        .log-entry.success { color: var(--neon-green); }
        .log-entry.warning { color: var(--neon-amber); }
        .log-entry.error { color: var(--neon-red); }

        /* 市场数据 */
        .market-stat {
            text-align: center;
            padding: 6px;
            background: rgba(0, 240, 255, 0.02);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 2px;
        }

        .market-stat .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
        }

        .market-stat .label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .market-stat .value.up { color: var(--neon-green); }
        .market-stat .value.down { color: var(--neon-red); }

        /* 霓虹效果 */
        .neon-cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
        }

        .neon-purple {
            color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple);
        }

        .neon-green {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
        }

        .neon-red {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
        }

        /* Markdown 内容 */
        .markdown-content {
            font-size: 12px;
            line-height: 1.5;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            margin-top: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .markdown-content strong {
            color: var(--neon-amber);
        }

        .markdown-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-left: 1rem;
        }

        /* 工具栏 */
        .toolbar {
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .toolbar-btn {
            padding: 6px 16px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--neon-cyan);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toolbar-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* 容器 */
        .container {
            max-width: 100%;
            padding: 0 20px 20px;
        }

        .grid-stack > .grid-stack-item > .grid-stack-item-content {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-bg"></div>

    <div class="container">
        <!-- 顶部栏 -->
        <header class="toolbar">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="font-orbitron text-xl font-bold neon-cyan tracking-wider">VIBE TRADING</h1>
                    <p class="text-[10px] text-gray-400 font-rajdhani tracking-widest">QUANTUM COMMAND CENTER</p>
                </div>
                <div class="h-6 w-px bg-gray-700"></div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2">
                        <span class="status-dot" id="connection-dot"></span>
                        <span class="text-xs font-rajdhani" id="connection-text">连接中...</span>
                    </div>
                    <div class="font-mono text-xs text-gray-400" id="timestamp">--:--:--</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="resetLayout()" class="toolbar-btn">重置布局</button>
                <button onclick="resetData()" class="toolbar-btn">重置数据</button>
            </div>
        </header>

        <!-- GridStack 网格容器 -->
        <div class="grid-stack" id="gridstack-container"></div>
    </div>

    <script>
        // 全局状态
        let ws = null;
        let klineData = [];
        let decisions = [];
        let agentReports = {};
        let currentTab = 'analysts';
        let klineChart = null;
        let decisionTree = null;
        let grid = null;

        // 磁贴配置
        const TILES = [
            {
                id: 'market',
                x: 0, y: 0, w: 12, h: 2,
                title: '📊 市场概览',
                content: `
                    <div class="grid grid-cols-6 gap-2">
                        <div class="market-stat">
                            <div class="label">交易对</div>
                            <div class="value neon-cyan" id="market-symbol">BTCUSDT</div>
                        </div>
                        <div class="market-stat">
                            <div class="label">当前价格</div>
                            <div class="value" id="market-price">--</div>
                        </div>
                        <div class="market-stat">
                            <div class="label">24h涨跌</div>
                            <div class="value" id="market-change">--</div>
                        </div>
                        <div class="market-stat">
                            <div class="label">24h成交量</div>
                            <div class="value" id="market-volume">--</div>
                        </div>
                        <div class="market-stat">
                            <div class="label">时间周期</div>
                            <div class="value" id="market-interval">5m</div>
                        </div>
                        <div class="market-stat">
                            <div class="label">K线数量</div>
                            <div class="value" id="market-count">200</div>
                        </div>
                    </div>
                `
            },
            {
                id: 'kline',
                x: 0, y: 2, w: 8, h: 6,
                title: '📈 实时K线',
                content: `<div id="kline-chart" class="w-full h-full"></div>`
            },
            {
                id: 'indicators',
                x: 8, y: 2, w: 4, h: 3,
                title: '📊 技术指标',
                content: `
                    <div class="space-y-2">
                        <div class="flex items-center justify-between p-2 bg-gray-900/30 rounded">
                            <span class="text-xs text-gray-400">RSI</span>
                            <span class="font-mono text-xs" id="indicator-rsi">--</span>
                        </div>
                        <div class="flex items-center justify-between p-2 bg-gray-900/30 rounded">
                            <span class="text-xs text-gray-400">MACD</span>
                            <span class="font-mono text-xs" id="indicator-macd">--</span>
                        </div>
                        <div class="flex items-center justify-between p-2 bg-gray-900/30 rounded">
                            <span class="text-xs text-gray-400">布林带</span>
                            <span class="font-mono text-xs" id="indicator-bb">--</span>
                        </div>
                    </div>
                `
            },
            {
                id: 'phases',
                x: 8, y: 5, w: 4, h: 6,
                title: '🔄 Agent协作',
                content: `
                    <div class="flex flex-col gap-2">
                        <div class="phase-node" data-phase="analysts">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-orbitron text-xs font-bold">PHASE 1</span>
                                <span class="text-[9px] text-gray-400">分析师</span>
                            </div>
                            <div class="flex flex-wrap gap-1">
                                <span class="agent-tag technical">技术</span>
                                <span class="agent-tag fundamental">基本面</span>
                                <span class="agent-tag news">新闻</span>
                                <span class="agent-tag sentiment">情绪</span>
                            </div>
                            <div class="mt-1 text-[10px] text-gray-500" id="phase-analysts-status">等待中...</div>
                        </div>
                        <div class="phase-node" data-phase="researchers">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-orbitron text-xs font-bold">PHASE 2</span>
                                <span class="text-[9px] text-gray-400">研究员</span>
                            </div>
                            <div class="flex flex-wrap gap-1">
                                <span class="agent-tag bull">看涨</span>
                                <span class="agent-tag bear">看跌</span>
                                <span class="agent-tag pm">研经</span>
                            </div>
                            <div class="mt-1 text-[10px] text-gray-500" id="phase-researchers-status">等待中...</div>
                        </div>
                        <div class="phase-node" data-phase="risk">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-orbitron text-xs font-bold">PHASE 3</span>
                                <span class="text-[9px] text-gray-400">风控</span>
                            </div>
                            <div class="flex flex-wrap gap-1">
                                <span class="agent-tag risk">激进</span>
                                <span class="agent-tag risk">中立</span>
                                <span class="agent-tag risk">保守</span>
                            </div>
                            <div class="mt-1 text-[10px] text-gray-500" id="phase-risk-status">等待中...</div>
                        </div>
                        <div class="phase-node" data-phase="trader">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-orbitron text-xs font-bold">PHASE 4</span>
                                <span class="text-[9px] text-gray-400">决策</span>
                            </div>
                            <div class="flex flex-wrap gap-1">
                                <span class="agent-tag trader">交易员</span>
                                <span class="agent-tag pm">PM</span>
                            </div>
                            <div class="mt-1 text-[10px] text-gray-500" id="phase-trader-status">等待中...</div>
                        </div>
                    </div>
                `
            },
            {
                id: 'current-decision',
                x: 0, y: 8, w: 4, h: 3,
                title: '🎯 当前决策',
                content: `
                    <div class="flex flex-col justify-center items-center h-full">
                        <div class="text-4xl font-orbitron font-bold mb-1" id="current-decision-text">--</div>
                        <div class="text-xs text-gray-400 text-center" id="current-rationale">等待决策...</div>
                        <div class="mt-2 flex gap-3 text-[10px]">
                            <div class="text-center">
                                <div class="text-gray-500">置信度</div>
                                <div class="font-mono" id="decision-confidence">--</div>
                            </div>
                            <div class="text-center">
                                <div class="text-gray-500">仓位</div>
                                <div class="font-mono" id="decision-position">--</div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 'stats',
                x: 4, y: 8, w: 4, h: 3,
                title: '📊 决策统计',
                content: `
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <div class="text-center">
                            <div class="text-2xl font-bold neon-green" id="stat-buy">0</div>
                            <div class="text-[9px] text-gray-400">买入</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold" style="color: var(--neon-amber)" id="stat-hold">0</div>
                            <div class="text-[9px] text-gray-400">观望</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold neon-red" id="stat-sell">0</div>
                            <div class="text-[9px] text-gray-400">卖出</div>
                        </div>
                    </div>
                    <div class="pt-2 border-t border-gray-800">
                        <div class="flex justify-between text-[10px] text-gray-400">
                            <span>总决策</span>
                            <span class="font-mono" id="stat-total">0</span>
                        </div>
                        <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                            <span>胜率</span>
                            <span class="font-mono" id="stat-winrate">--</span>
                        </div>
                    </div>
                `
            },
            {
                id: 'history',
                x: 8, y: 11, w: 4, h: 4,
                title: '📜 决策历史',
                content: `<div id="decision-list"><div class="text-gray-500 text-sm text-center py-4">暂无决策记录</div></div>`
            },
            {
                id: 'decision-tree',
                x: 0, y: 11, w: 4, h: 4,
                title: '🌳 决策树',
                content: `<div class="font-mono text-[10px]" id="decision-tree-content"><div class="text-gray-500 text-center py-4">等待决策数据...</div></div>`
            },
            {
                id: 'reports',
                x: 4, y: 11, w: 4, h: 4,
                title: '📋 Agent报告',
                content: `
                    <div class="flex gap-1 mb-2 flex-wrap">
                        <button onclick="showReport('analysts')" class="tab-btn active" data-tab="analysts">分析师</button>
                        <button onclick="showReport('researchers')" class="tab-btn" data-tab="researchers">研究员</button>
                        <button onclick="showReport('risk')" class="tab-btn" data-tab="risk">风控</button>
                        <button onclick="showReport('trader')" class="tab-btn" data-tab="trader">交易员</button>
                        <button onclick="showReport('pm')" class="tab-btn" data-tab="pm">PM</button>
                    </div>
                    <div id="report-content" class="markdown-content"><p class="text-gray-500 italic text-xs">等待 Agent 报告...</p></div>
                `
            },
            {
                id: 'logs',
                x: 0, y: 15, w: 12, h: 4,
                title: '🔧 实时日志',
                content: `<div class="font-mono" id="log-container"><div class="text-gray-500 text-[10px]">等待日志...</div></div>`
            }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initGridStack();
            initKlineChart();
            connectWebSocket();
            updateTimestamp();
            setInterval(updateTimestamp, 1000);
        });

        // 初始化 GridStack
        function initGridStack() {
            grid = GridStack.init({
                column: 12,
                cellHeight: 80,
                minRow: 1,
                margin: 8,
                animate: true,
                float: true,
                removable: false,
                acceptWidgets: true,
                disableOneColumnMode: true,
                disableResize: false,
                disableDrag: false
            }, '.grid-stack');

            // 加载保存的布局
            loadLayout();

            // 监听布局变化
            grid.on('change', (event, items) => {
                saveLayout();
            });

            // 监听调整大小事件，调整图表大小
            grid.on('resizestop', (event, el) => {
                if (klineChart) {
                    klineChart.resize();
                }
            });
        }

        // 创建磁贴
        function createTile(tile) {
            const widget = document.createElement('div');
            widget.className = 'grid-stack-item';
            widget.setAttribute('gs-x', tile.x);
            widget.setAttribute('gs-y', tile.y);
            widget.setAttribute('gs-w', tile.w);
            widget.setAttribute('gs-h', tile.h);
            widget.setAttribute('gs-id', tile.id);

            widget.innerHTML = `
                <div class="grid-stack-item-content">
                    <div class="tile-header">
                        <div class="tile-title">${tile.title}</div>
                    </div>
                    <div class="tile-content">${tile.content}</div>
                </div>
            `;

            return widget;
        }

        // 加载布局
        function loadLayout() {
            const saved = localStorage.getItem('vibe-trading-gridstack-layout');
            if (saved) {
                try {
                    const layout = JSON.parse(saved);
                    grid.load(layout, true);
                } catch (e) {
                    console.error('Failed to load layout:', e);
                    // 加载默认布局
                    loadDefaultLayout();
                }
            } else {
                loadDefaultLayout();
            }
        }

        // 加载默认布局
        function loadDefaultLayout() {
            TILES.forEach(tile => {
                const widget = createTile(tile);
                grid.addWidget(widget);
            });
        }

        // 保存布局
        function saveLayout() {
            const layout = grid.save(false);
            localStorage.setItem('vibe-trading-gridstack-layout', JSON.stringify(layout));
        }

        // 重置布局
        function resetLayout() {
            localStorage.removeItem('vibe-trading-gridstack-layout');
            grid.removeAll();
            loadDefaultLayout();
        }

        // 更新时间戳
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent =
                now.toLocaleTimeString('zh-CN', { hour12: false });
        }

        // 初始化 K线图表
        function initKlineChart() {
            klineChart = echarts.init(document.getElementById('kline-chart'));
            klineChart.setOption({
                grid: {
                    left: 10,
                    right: 60,
                    top: 10,
                    bottom: 20
                },
                xAxis: {
                    type: 'category',
                    data: [],
                    axisLine: {
                        lineStyle: { color: '#4a5568' }
                    },
                    axisLabel: {
                        color: '#9ca3af',
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    axisLine: {
                        lineStyle: { color: '#4a5568' }
                    },
                    splitLine: {
                        lineStyle: { color: '#2d3748' }
                    },
                    axisLabel: {
                        color: '#9ca3af',
                        fontSize: 10
                    }
                },
                dataZoom: [
                    { type: 'inside', start: 50, end: 100 },
                    {
                        show: true,
                        type: 'slider',
                        top: '90%',
                        start: 50,
                        end: 100,
                        borderColor: 'rgba(0, 240, 255, 0.3)',
                        fillerColor: 'rgba(0, 240, 255, 0.1)',
                        handleStyle: {
                            color: '#00f0ff'
                        }
                    }
                ],
                series: [{
                    type: 'candlestick',
                    data: [],
                    itemStyle: {
                        color: '#10b981',
                        color0: '#ef4444',
                        borderColor: '#10b981',
                        borderColor0: '#ef4444'
                    },
                    markPoint: {
                        data: [],
                        symbol: 'pin',
                        symbolSize: 30
                    }
                }]
            });

            window.addEventListener('resize', () => {
                klineChart.resize();
            });
        }

        // WebSocket 连接
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8000/ws');

            ws.onopen = () => {
                updateConnectionStatus(true);
                console.log('✅ WebSocket connected');
            };

            ws.onclose = () => {
                updateConnectionStatus(false);
                console.log('❌ WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        // 处理消息
        function handleMessage(msg) {
            switch(msg.type) {
                case 'init':
                    klineData = msg.data.klines || [];
                    decisions = msg.data.decisions || [];
                    agentReports = msg.data.agent_reports || {};
                    updateAll();
                    break;
                case 'kline':
                    klineData.push(msg.data);
                    updateKlineChart();
                    updateMarketData(msg.data);
                    break;
                case 'decision':
                    decisions.push(msg.data);
                    updateDecisionList();
                    updateStats();
                    updateCurrentDecision(msg.data);
                    break;
                case 'log':
                    addLog(msg.data);
                    break;
                case 'phase':
                    updatePhaseStatus(msg.data);
                    break;
                case 'report':
                    if (!agentReports[msg.data.phase]) {
                        agentReports[msg.data.phase] = {};
                    }
                    agentReports[msg.data.phase][msg.data.agent] = msg.data.content;
                    if (currentTab === msg.data.phase ||
                        (currentTab === 'analysts' && msg.data.phase === '')) {
                        showReport(currentTab);
                    }
                    break;
                case 'reset':
                    klineData = [];
                    decisions = [];
                    agentReports = {};
                    decisionTree = null;
                    updateAll();
                    break;
                case 'decision_tree':
                    decisionTree = msg.data;
                    updateDecisionTree();
                    break;
            }
        }

        // 更新所有显示
        function updateAll() {
            updateKlineChart();
            updateDecisionList();
            updateStats();
            showReport(currentTab);
        }

        // 更新 K线图表
        function updateKlineChart() {
            if (!klineChart || klineData.length === 0) return;

            const candleData = klineData.map(k => [k.open, k.close, k.low, k.high]);
            const times = klineData.map(k => {
                const date = new Date(k.time);
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            });

            const markPoints = decisions.map(d => {
                const idx = klineData.findIndex(k => k.time === d.time);
                if (idx === -1) return null;
                return {
                    name: d.decision,
                    coord: [idx, d.close],
                    value: d.decision === 'HOLD' ? '○' : (d.decision.includes('BUY') ? '↑' : '↓'),
                    itemStyle: {
                        color: d.decision === 'HOLD' ? '#fbbf24' : (d.decision.includes('BUY') ? '#10b981' : '#ef4444')
                    }
                };
            }).filter(p => p !== null);

            klineChart.setOption({
                xAxis: { data: times },
                series: [{
                    data: candleData,
                    markPoint: { data: markPoints }
                }]
            });
        }

        // 更新市场数据
        function updateMarketData(kline) {
            const priceEl = document.getElementById('market-price');
            const price = kline.close;

            priceEl.textContent = '$' + price.toFixed(2);
            priceEl.className = 'value ' + (kline.close >= kline.open ? 'up' : 'down');

            if (klineData.length > 1) {
                const prevClose = klineData[klineData.length - 2].close;
                const change = ((price - prevClose) / prevClose * 100);
                const changeEl = document.getElementById('market-change');
                changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.className = 'value ' + (change >= 0 ? 'up' : 'down');
            }
        }

        // 更新决策列表
        function updateDecisionList() {
            const container = document.getElementById('decision-list');
            if (decisions.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">暂无决策记录</div>';
                return;
            }

            container.innerHTML = decisions.slice(-20).reverse().map(d => {
                const type = d.decision === 'HOLD' ? 'hold' : (d.decision.includes('BUY') ? 'buy' : 'sell');
                return `
                    <div class="decision-item ${type}">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[10px] text-gray-500 font-mono">#${d.index}</span>
                            <span class="text-[10px] font-bold" style="color: ${d.decision === 'HOLD' ? 'var(--neon-amber)' : (d.decision.includes('BUY') ? 'var(--neon-green)' : 'var(--neon-red)')}">${d.decision}</span>
                        </div>
                        <div class="text-xs font-mono">$${d.close?.toFixed(2) || '--'}</div>
                        <div class="text-[10px] text-gray-500 truncate mt-1">${d.rationale?.substring(0, 60) || ''}</div>
                    </div>
                `;
            }).join('');
        }

        // 更新统计
        function updateStats() {
            const buyCount = decisions.filter(d => d.decision.includes('BUY')).length;
            const sellCount = decisions.filter(d => d.decision.includes('SELL')).length;
            const holdCount = decisions.filter(d => d.decision === 'HOLD').length;

            document.getElementById('stat-buy').textContent = buyCount;
            document.getElementById('stat-sell').textContent = sellCount;
            document.getElementById('stat-hold').textContent = holdCount;
            document.getElementById('stat-total').textContent = decisions.length;

            const winCount = decisions.filter(d => {
                if (!d.close || !d.pnl) return false;
                return d.pnl > 0;
            }).length;
            const winRate = decisions.length > 0 ? (winCount / decisions.length * 100).toFixed(1) : '--';
            document.getElementById('stat-winrate').textContent = winRate + '%';
        }

        // 更新当前决策
        function updateCurrentDecision(decision) {
            const el = document.getElementById('current-decision-text');
            const rationale = document.getElementById('current-rationale');

            el.textContent = decision.decision;
            el.className = 'text-4xl font-orbitron font-bold mb-1 ' +
                (decision.decision === 'HOLD' ? 'text-[var(--neon-amber)]' :
                 (decision.decision.includes('BUY') ? 'neon-green' : 'neon-red'));

            rationale.textContent = decision.rationale?.substring(0, 100) || '';

            if (decision.confidence) {
                document.getElementById('decision-confidence').textContent = decision.confidence + '%';
            }
            if (decision.position_size) {
                document.getElementById('decision-position').textContent = decision.position_size + '%';
            }
        }

        // 更新阶段状态
        function updatePhaseStatus(data) {
            const phaseMap = {
                'analysts': 'phase-analysts-status',
                'researchers': 'phase-researchers-status',
                'risk': 'phase-risk-status',
                'trader': 'phase-trader-status'
            };

            const phaseNodes = document.querySelectorAll('.phase-node');

            phaseNodes.forEach(node => {
                node.classList.remove('active', 'completed');
            });

            if (data.phase && phaseMap[data.phase]) {
                const statusEl = document.getElementById(phaseMap[data.phase]);
                const nodeEl = document.querySelector(`.phase-node[data-phase="${data.phase}"]`);

                if (data.status === 'running') {
                    statusEl.textContent = '运行中...';
                    statusEl.className = 'mt-1 text-[10px] text-[var(--neon-cyan)]';
                    nodeEl.classList.add('active');
                } else if (data.status === 'completed') {
                    statusEl.textContent = '完成';
                    statusEl.className = 'mt-1 text-[10px] text-[var(--neon-green)]';
                    nodeEl.classList.add('completed');
                }
            }
        }

        // 显示报告
        function showReport(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tab) btn.classList.add('active');
            });

            const container = document.getElementById('report-content');
            const reports = agentReports[tab] || agentReports[''] || {};

            if (Object.keys(reports).length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic text-xs">暂无报告</p>';
                return;
            }

            let content = '';
            for (const [agent, report] of Object.entries(reports)) {
                content += `### ${agent}\n\n${marked.parse(report)}\n\n---\n\n`;
            }

            container.innerHTML = content || '<p class="text-gray-500 italic text-xs">暂无报告</p>';
        }

        // 添加日志
        function addLog(log) {
            const container = document.getElementById('log-container');
            const time = log.timestamp ? log.timestamp.substring(11, 19) : '';
            const tag = log.tag ? `[${log.tag}]` : '';

            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${log.level || 'info'}`;
            logEntry.innerHTML = `<span class="text-gray-600">${time}</span> ${tag} ${log.message}`;

            container.appendChild(logEntry);
            container.scrollTop = container.scrollHeight;

            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connection-dot');
            const text = document.getElementById('connection-text');

            if (connected) {
                dot.className = 'status-dot online';
                text.textContent = '已连接';
                text.className = 'text-xs font-rajdhani text-[var(--neon-green)]';
            } else {
                dot.className = 'status-dot offline animate-pulse';
                text.textContent = '连接中...';
                text.className = 'text-xs font-rajdhani text-[var(--neon-red)]';
            }
        }

        // 重置数据
        async function resetData() {
            try {
                await fetch('/api/reset', { method: 'POST' });
                document.getElementById('log-container').innerHTML = '<div class="text-gray-500 text-[10px]">已重置</div>';
            } catch (e) {
                console.error('Reset failed:', e);
            }
        }

        // 更新决策树
        function updateDecisionTree() {
            const container = document.getElementById('decision-tree-content');
            if (!decisionTree || !decisionTree.root) {
                container.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">等待决策数据...</div>';
                return;
            }

            container.innerHTML = renderTreeNode(decisionTree.root);
        }

        // 渲染树节点
        function renderTreeNode(node, depth = 0) {
            if (!node) return '';

            const statusClass = node.status || 'pending';
            const indent = '  '.repeat(depth);

            let html = `${indent}<div class="mb-2">`;
            html += `<div class="text-[var(--neon-cyan)]">${node.label || node.phase}</div>`;

            if (node.duration) {
                html += `<div class="text-gray-500 text-[9px]">⏱ ${node.duration.toFixed(2)}s</div>`;
            }

            if (node.agents) {
                html += '<div class="mt-1 flex flex-wrap gap-1">';
                node.agents.forEach(agent => {
                    const status = agent.status === 'completed' ? 'text-[var(--neon-green)]' : 'text-[var(--neon-amber)]';
                    html += `<span class="text-[9px] ${status}">${agent.name}</span>`;
                });
                html += '</div>';
            }

            html += '</div>';

            if (node.children && node.children.length > 0) {
                html += '<div class="ml-3 border-l border-gray-700 pl-2">';
                node.children.forEach(child => {
                    html += renderTreeNode(child, depth + 1);
                });
                html += '</div>';
            }

            return html;
        }
    </script>
</body>
</html>
